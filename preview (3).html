<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Tornado</title>
<style>
  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: #000;
  }

  canvas {
    display: block;
  }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
let scene, camera, renderer, points, streaks, galaxyDust, stars;
let uniforms;

const COUNT = 35000;
const TRAIL_COUNT = 7000;
const GALAXY_COUNT = 60000;
const STAR_COUNT = 900;

init();
animate();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 2000);
  camera.position.set(135, 75, 205);

  renderer = new THREE.WebGLRenderer({
    antialias: true,
    alpha: false,
    powerPreference: "high-performance"
  });

  renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
  renderer.setSize(innerWidth, innerHeight);

  // Clear fully each frame; motion trails are drawn by LineSegments, not by framebuffer buildup.
  renderer.setClearColor(0x000000, 1);
  document.body.appendChild(renderer.domElement);

  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(COUNT * 3);
  const seed = new Float32Array(COUNT);

  for (let i = 0; i < COUNT; i++) {
    const i3 = i * 3;

    // position is compact particle data:
    // x = base angle, y = start height, z = radial lane.
    pos[i3] = Math.random() * Math.PI * 2;
    pos[i3 + 1] = Math.random() * 240 - 120;
    pos[i3 + 2] = Math.random();
    seed[i] = Math.random();
  }

  geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  geo.setAttribute("seed", new THREE.BufferAttribute(seed, 1));

  uniforms = {
    time: { value: 0 }
  };

  const mat = new THREE.ShaderMaterial({
    uniforms,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,

    vertexShader: `
      uniform float time;
      attribute float seed;
      varying vec3 vColor;
      varying float vAlpha;

      float bandWeight(float p, float center) {
        float d = abs(p - center);
        d = min(d, 1.0 - d);
        return pow(smoothstep(0.28, 0.0, d), 1.35);
      }

      vec3 neonColor(float h, float t, float seedValue) {
        float p = fract(h * 0.95 + t * 0.32 + seedValue * 0.05);

        vec3 blue = vec3(0.02, 0.62, 1.0);
        vec3 green = vec3(0.04, 1.0, 0.48);
        vec3 yellow = vec3(1.0, 0.88, 0.18);
        vec3 pink = vec3(1.0, 0.08, 0.85);
        vec3 violet = vec3(0.36, 0.1, 1.0);

        float b = bandWeight(p, 0.00);
        float g = bandWeight(p, 0.24);
        float y = bandWeight(p, 0.48);
        float m = bandWeight(p, 0.70);
        float v = bandWeight(p, 0.88);
        float sum = b + g + y + m + v + 0.0001;

        vec3 color = (blue * b + green * g + yellow * y + pink * m + violet * v) / sum;
        float scan = pow(sin((h * 8.0 - t * 3.8 + seedValue * 4.0) * 6.2831853) * 0.5 + 0.5, 5.0);
        return color + scan * vec3(0.18, 0.28, 0.32);
      }

      void main() {
        float t = time;
        float baseAngle = position.x;
        float lane = position.z;

        float speed = mix(34.0, 84.0, seed);
        float y = mod(position.y + t * speed + seed * 240.0, 240.0) - 120.0;
        float h = clamp((y + 120.0) / 240.0, 0.0, 1.0);

        // Funnel profile: thin rope at the bottom, broad rotating mouth at the top.
        float cone = mix(3.5, 92.0, pow(h, 1.85));
        cone += sin(h * 23.0 - t * 2.5 + seed * 8.0) * mix(1.5, 8.0, h);
        cone *= 1.0 - 0.16 * smoothstep(0.32, 0.55, h) * (1.0 - smoothstep(0.56, 0.82, h));

        // Quantized lanes create visible spiral ribbons instead of a filled cylinder.
        float ribbonCount = 18.0;
        float ribbon = floor(seed * ribbonCount);
        float ribbonPhase = ribbon / ribbonCount * 6.2831853;
        float noise = fract(sin((seed + baseAngle) * 43758.5453) * 12634.873);
        float ribbonOffset = sin(ribbon * 1.7 + h * 18.0 - t * 3.0) * 0.18;
        float radialLane = mix(0.18, 1.04, pow(lane, 0.52)) + ribbonOffset;

        // Some upper particles escape into the wide disk and spiral back inward.
        float topDisk = smoothstep(0.66, 1.0, h) * smoothstep(0.72, 0.98, lane);
        float radius = mix(cone * radialLane, mix(75.0, 170.0, lane), topDisk * 0.62);

        float spin = t * mix(1.25, 4.4, 1.0 - h) + t * 0.9;
        float helix = h * 24.0 + sin(h * 10.0 + t * 0.75) * 0.9;
        float looseTop = smoothstep(0.78, 1.0, h) * 0.42;
        float angleJitter = (baseAngle - 3.1415926) * mix(0.045, 0.18, h) + (noise - 0.5) * looseTop;
        float angle = ribbonPhase + spin + helix + angleJitter;
        float topFray = smoothstep(0.72, 1.0, h);
        float rimNoise = sin(angle * 5.0 + seed * 37.0 + t * 1.7) * 0.5 + 0.5;
        float verticalFray = topFray * (rimNoise - 0.5) * 16.0;
        radius += topFray * sin(angle * 4.0 + seed * 31.0 + t * 0.8) * mix(3.0, 18.0, lane);

        // The vortex snakes slightly, so it does not read as a straight column.
        float bendX = sin(h * 4.3 + t * 0.9) * mix(0.0, 22.0, h);
        float bendZ = cos(h * 3.7 + t * 0.7) * mix(0.0, 18.0, h);

        vec3 p;
        p.x = cos(angle) * radius + bendX;
        p.y = y + verticalFray;
        p.z = sin(angle) * radius + bendZ;

        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_Position = projectionMatrix * mv;

        float topBoost = smoothstep(0.72, 1.0, h);
        gl_PointSize = mix(2.0, 4.8, topBoost + seed * 0.35) * (220.0 / -mv.z);

        vec3 color = neonColor(h, t, seed);
        color += vec3(0.08, 0.1, 0.12) * sin(seed * 32.0 + t * 8.0);

        vColor = color;
        float rimFade = 1.0 - smoothstep(0.84, 1.0, h) * smoothstep(0.48, 1.0, lane) * 0.5;
        float capFade = 1.0 - smoothstep(0.96, 1.0, h) * 0.36;
        vAlpha = (0.22 + 0.58 * smoothstep(0.02, 0.2, h)) * (1.0 - topDisk * 0.2) * rimFade * capFade;
      }
    `,

    fragmentShader: `
      varying vec3 vColor;
      varying float vAlpha;

      void main() {
        float d = length(gl_PointCoord - 0.5);
        if (d > 0.5) discard;

        float a = smoothstep(0.5, 0.0, d) * vAlpha;
        gl_FragColor = vec4(vColor, a);
      }
    `
  });

  points = new THREE.Points(geo, mat);
  scene.add(points);

  addStreaks();
  addGalaxyDust();
  addStars();

  window.addEventListener("resize", onResize);
}

function addStars() {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(STAR_COUNT * 3);
  const seed = new Float32Array(STAR_COUNT);

  for (let i = 0; i < STAR_COUNT; i++) {
    const i3 = i * 3;
    const angle = Math.random() * Math.PI * 2;
    const radius = 360 + Math.random() * 520;
    const height = Math.random() * 560 - 250;

    pos[i3] = Math.cos(angle) * radius;
    pos[i3 + 1] = height;
    pos[i3 + 2] = Math.sin(angle) * radius;
    seed[i] = Math.random();
  }

  geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  geo.setAttribute("seed", new THREE.BufferAttribute(seed, 1));

  const mat = new THREE.ShaderMaterial({
    uniforms,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,

    vertexShader: `
      uniform float time;
      attribute float seed;
      varying float vAlpha;
      varying vec3 vColor;

      void main() {
        vec3 p = position;
        float drift = time * 0.18 + seed * 6.2831853;
        p.x += sin(drift) * 12.0;
        p.z += cos(drift * 0.83) * 12.0;

        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_Position = projectionMatrix * mv;

        float twinkle = 0.35 + 0.65 * pow(sin(time * mix(4.0, 9.0, seed) + seed * 40.0) * 0.5 + 0.5, 3.0);
        gl_PointSize = mix(1.3, 3.8, seed) * twinkle * (300.0 / -mv.z);

        vAlpha = twinkle * mix(0.32, 0.82, seed);
        vColor = mix(vec3(0.22, 0.9, 1.0), vec3(1.0, 0.84, 0.34), seed);
      }
    `,

    fragmentShader: `
      varying float vAlpha;
      varying vec3 vColor;

      void main() {
        float d = length(gl_PointCoord - 0.5);
        if (d > 0.5) discard;

        float a = smoothstep(0.5, 0.0, d) * vAlpha;
        gl_FragColor = vec4(vColor, a);
      }
    `
  });

  stars = new THREE.Points(geo, mat);
  scene.add(stars);
}

function addGalaxyDust() {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(GALAXY_COUNT * 3);
  const seed = new Float32Array(GALAXY_COUNT);

  for (let i = 0; i < GALAXY_COUNT; i++) {
    const i3 = i * 3;
    pos[i3] = Math.random() * Math.PI * 2;
    pos[i3 + 1] = Math.random();
    pos[i3 + 2] = Math.random();
    seed[i] = Math.random();
  }

  geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  geo.setAttribute("seed", new THREE.BufferAttribute(seed, 1));

  const mat = new THREE.ShaderMaterial({
    uniforms,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,

    vertexShader: `
      uniform float time;
      attribute float seed;
      varying vec3 vColor;
      varying float vAlpha;

      vec3 palette(float p) {
        vec3 blue = vec3(0.03, 0.58, 1.0);
        vec3 green = vec3(0.04, 1.0, 0.52);
        vec3 yellow = vec3(1.0, 0.82, 0.16);
        vec3 pink = vec3(1.0, 0.12, 0.78);
        p = fract(p);
        if (p < 0.25) return mix(blue, green, p / 0.25);
        if (p < 0.50) return mix(green, yellow, (p - 0.25) / 0.25);
        if (p < 0.75) return mix(yellow, pink, (p - 0.50) / 0.25);
        return mix(pink, blue, (p - 0.75) / 0.25);
      }

      void main() {
        float baseAngle = position.x;
        float radiusSeed = position.y;
        float heightSeed = position.z;
        float armCount = 5.0;
        float arm = floor(seed * armCount);
        float armPhase = arm / armCount * 6.2831853;

        float flow = fract(radiusSeed + time * mix(0.012, 0.028, seed));
        float outerRadius = mix(320.0, 900.0, pow(seed, 0.58));
        float radius = mix(outerRadius, 28.0, pow(flow, 1.48));
        float angle = armPhase + baseAngle * 0.18 + flow * 11.5 - time * 0.32;
        angle += sin(flow * 20.0 + seed * 16.0) * 0.28;

        float fromTop = step(0.5, fract(seed * 13.17));
        float verticalSide = mix(-1.0, 1.0, fromTop);
        float outerLift = verticalSide * mix(120.0, 245.0, fract(seed * 7.31));
        float lift = mix(outerLift, 12.0, pow(flow, 1.15));
        float wave = sin(angle * 2.0 + time * 0.8 + seed * 20.0) * mix(18.0, 42.0, 1.0 - flow);

        vec3 p;
        p.x = cos(angle) * radius * 1.18;
        p.y = lift + (heightSeed - 0.5) * 72.0 + wave;
        p.z = sin(angle) * radius * 0.78;

        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_Position = projectionMatrix * mv;

        float edgeFade = smoothstep(0.0, 0.08, flow) * (1.0 - smoothstep(0.92, 1.0, flow));
        float sparkle = 0.55 + 0.45 * sin(time * 4.0 + seed * 80.0);
        gl_PointSize = mix(1.2, 3.8, seed) * sparkle * (285.0 / -mv.z);

        vColor = palette(flow + time * 0.12 + seed * 0.2);
        vAlpha = edgeFade * mix(0.18, 0.52, seed) * sparkle;
      }
    `,

    fragmentShader: `
      varying vec3 vColor;
      varying float vAlpha;

      void main() {
        float d = length(gl_PointCoord - 0.5);
        if (d > 0.5) discard;

        float a = smoothstep(0.5, 0.0, d) * vAlpha;
        gl_FragColor = vec4(vColor, a);
      }
    `
  });

  galaxyDust = new THREE.Points(geo, mat);
  scene.add(galaxyDust);
}

function addStreaks() {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(TRAIL_COUNT * 2 * 3);
  const seed = new Float32Array(TRAIL_COUNT * 2);
  const tail = new Float32Array(TRAIL_COUNT * 2);

  for (let i = 0; i < TRAIL_COUNT; i++) {
    const angle = Math.random() * Math.PI * 2;
    const y = Math.random() * 240 - 120;
    const lane = Math.random();
    const s = Math.random();

    for (let j = 0; j < 2; j++) {
      const id = i * 2 + j;
      const i3 = id * 3;
      pos[i3] = angle;
      pos[i3 + 1] = y;
      pos[i3 + 2] = lane;
      seed[id] = s;
      tail[id] = j;
    }
  }

  geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  geo.setAttribute("seed", new THREE.BufferAttribute(seed, 1));
  geo.setAttribute("tail", new THREE.BufferAttribute(tail, 1));

  const mat = new THREE.ShaderMaterial({
    uniforms,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,

    vertexShader: `
      uniform float time;
      attribute float seed;
      attribute float tail;
      varying vec3 vColor;
      varying float vAlpha;

      float bandWeight(float p, float center) {
        float d = abs(p - center);
        d = min(d, 1.0 - d);
        return pow(smoothstep(0.28, 0.0, d), 1.35);
      }

      vec3 neonColor(float h, float t, float seedValue) {
        float p = fract(h * 0.95 + t * 0.32 + seedValue * 0.05);

        vec3 blue = vec3(0.02, 0.62, 1.0);
        vec3 green = vec3(0.04, 1.0, 0.48);
        vec3 yellow = vec3(1.0, 0.88, 0.18);
        vec3 pink = vec3(1.0, 0.08, 0.85);
        vec3 violet = vec3(0.36, 0.1, 1.0);

        float b = bandWeight(p, 0.00);
        float g = bandWeight(p, 0.24);
        float y = bandWeight(p, 0.48);
        float m = bandWeight(p, 0.70);
        float v = bandWeight(p, 0.88);
        float sum = b + g + y + m + v + 0.0001;

        vec3 color = (blue * b + green * g + yellow * y + pink * m + violet * v) / sum;
        float scan = pow(sin((h * 8.0 - t * 3.8 + seedValue * 4.0) * 6.2831853) * 0.5 + 0.5, 5.0);
        return color + scan * vec3(0.18, 0.28, 0.32);
      }

      void main() {
        float trailTime = mix(0.012, 0.034, seed);
        float t = time - tail * trailTime;
        float baseAngle = position.x;
        float lane = position.z;

        float speed = mix(34.0, 84.0, seed);
        float headY = mod(position.y + time * speed + seed * 240.0, 240.0) - 120.0;
        float tailY = mod(position.y + (time - trailTime) * speed + seed * 240.0, 240.0) - 120.0;
        float wrapped = step(36.0, abs(headY - tailY));
        float y = mod(position.y + t * speed + seed * 240.0, 240.0) - 120.0;
        float h = clamp((y + 120.0) / 240.0, 0.0, 1.0);

        float cone = mix(3.5, 92.0, pow(h, 1.85));
        cone += sin(h * 23.0 - t * 2.5 + seed * 8.0) * mix(1.5, 8.0, h);
        cone *= 1.0 - 0.16 * smoothstep(0.32, 0.55, h) * (1.0 - smoothstep(0.56, 0.82, h));

        float ribbonCount = 18.0;
        float ribbon = floor(seed * ribbonCount);
        float ribbonPhase = ribbon / ribbonCount * 6.2831853;
        float noise = fract(sin((seed + baseAngle) * 43758.5453) * 12634.873);
        float ribbonOffset = sin(ribbon * 1.7 + h * 18.0 - t * 3.0) * 0.18;
        float radialLane = mix(0.18, 1.04, pow(lane, 0.52)) + ribbonOffset;

        float topDisk = smoothstep(0.66, 1.0, h) * smoothstep(0.72, 0.98, lane);
        float radius = mix(cone * radialLane, mix(75.0, 170.0, lane), topDisk * 0.62);

        float spin = t * mix(1.25, 4.4, 1.0 - h) + t * 0.9;
        float helix = h * 24.0 + sin(h * 10.0 + t * 0.75) * 0.9;
        float looseTop = smoothstep(0.78, 1.0, h) * 0.42;
        float angleJitter = (baseAngle - 3.1415926) * mix(0.045, 0.18, h) + (noise - 0.5) * looseTop;
        float angle = ribbonPhase + spin + helix + angleJitter;
        float topFray = smoothstep(0.72, 1.0, h);
        float rimNoise = sin(angle * 5.0 + seed * 37.0 + t * 1.7) * 0.5 + 0.5;
        float verticalFray = topFray * (rimNoise - 0.5) * 16.0;
        radius += topFray * sin(angle * 4.0 + seed * 31.0 + t * 0.8) * mix(3.0, 18.0, lane);

        float bendX = sin(h * 4.3 + t * 0.9) * mix(0.0, 22.0, h);
        float bendZ = cos(h * 3.7 + t * 0.7) * mix(0.0, 18.0, h);

        vec3 p;
        p.x = cos(angle) * radius + bendX;
        p.y = y + verticalFray;
        p.z = sin(angle) * radius + bendZ;

        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_Position = projectionMatrix * mv;

        vColor = neonColor(h, time, seed);
        float rimFade = 1.0 - smoothstep(0.84, 1.0, h) * smoothstep(0.42, 1.0, lane) * 0.62;
        float capFade = 1.0 - smoothstep(0.95, 1.0, h) * 0.52;
        vAlpha = (1.0 - tail * 0.6) * (0.05 + 0.16 * smoothstep(0.08, 0.92, h)) * (1.0 - wrapped) * rimFade * capFade;
      }
    `,

    fragmentShader: `
      varying vec3 vColor;
      varying float vAlpha;

      void main() {
        gl_FragColor = vec4(vColor, vAlpha);
      }
    `
  });

  streaks = new THREE.LineSegments(geo, mat);
  scene.add(streaks);
}

function animate() {
  requestAnimationFrame(animate);

  uniforms.time.value += 0.009;
  const t = uniforms.time.value;

  const phase = t * 0.26;
  const dolly = 1.0 + Math.sin(t * 0.44) * 0.07 + Math.sin(t * 0.91) * 0.03;
  const pathX = Math.sin(phase) * 405;
  const pathZ = Math.cos(phase * 2.0) * 330;
  const height = 88 + Math.sin(t * 0.5) * 28 + Math.sin(t * 0.93) * 8;
  const target = new THREE.Vector3(
    Math.sin(t * 0.55) * 10,
    18 + Math.sin(t * 0.72) * 12,
    Math.cos(t * 0.48) * 8
  );

  const narrowView = innerWidth < 640;
  const frameScale = narrowView ? 1.24 : 1.0;

  camera.position.x = pathX * dolly * frameScale;
  camera.position.z = pathZ * dolly * frameScale;
  camera.position.y = height;
  camera.fov = (narrowView ? 74 : 68) + Math.sin(t * 0.38) * 2;
  camera.updateProjectionMatrix();
  camera.lookAt(target);
  camera.rotation.z += Math.sin(t * 0.72) * 0.018;

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}
</script>

</body>
</html>
